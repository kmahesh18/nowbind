name: Bug Report
description: Report a bug in NowBind
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below to help us fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of NowBind is affected?
      options:
        - Frontend
        - Backend / API
        - MCP Server
        - Agent API
        - Authentication
        - Database / Migrations
        - PWA / Notifications
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details.
      placeholder: |
        - OS: macOS 15
        - Browser: Chrome 131
        - Go version: 1.25
        - Node version: 20.x
        - Database: PostgreSQL 17

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant error logs or attach screenshots.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this hasn't been reported before
          required: true
        - label: I can reproduce this on the latest version of `main`
