title: "[Idea]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share an idea for NowBind. We'll discuss it here before it becomes a feature request.

  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: Describe your idea.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why would this be useful? Who would benefit?
